<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantify</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Main Logo Header -->
        <header>
            <h1 class="logo">Quantify</h1>
        </header>

        <!-- Dynamic Content Area -->
        <main id="main-content">
            
            <!-- Screen 1: Dashboard -->
            <div id="screen-dashboard" class="screen active">
                <div class="card" onclick="selectNetwork('Sewer')">
                    <div class="card-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    </div>
                    <div class="card-content">
                        <h2>Sewer</h2>
                        <p>Tap to view metrics</p>
                    </div>
                </div>
                
                <div class="card" onclick="selectNetwork('Stormwater')">
                    <div class="card-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"></path><path d="M8 19v2"></path><path d="M8 13v-1"></path><path d="M16 19v2"></path><path d="M16 13v-1"></path><path d="M12 21v2"></path><path d="M12 15v-1"></path></svg>
                    </div>
                    <div class="card-content">
                        <h2>Stormwater</h2>
                        <p>Tap to view metrics</p>
                    </div>
                </div>
            </div>

            <!-- Screen 2: Network Options -->
            <div id="screen-options" class="screen">
                <h2 id="options-title" class="screen-title">Sewer Options</h2>
                
                <div class="options-container">
                    <!-- Modelled Network -->
                    <div class="card option-card" onclick="openInputForm('modelled')">
                        <div class="card-icon option-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="3" width="4" height="4"></rect><rect x="3" y="17" width="4" height="4"></rect><rect x="17" y="17" width="4" height="4"></rect><line x1="12" y1="7" x2="12" y2="12"></line><line x1="5" y1="12" x2="19" y2="12"></line><line x1="5" y1="12" x2="5" y2="17"></line><line x1="19" y1="12" x2="19" y2="17"></line></svg>
                        </div>
                        <h3>Modelled Network</h3>
                        <p>Tap to view metrics</p>
                    </div>

                    <!-- Customize Network -->
                    <div class="card option-card" onclick="openInputForm('customize')">
                        <div class="card-icon option-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>
                        </div>
                        <h3>Customize Network</h3>
                        <p>Tap to view metrics</p>
                    </div>
                </div>

                <button class="back-btn" onclick="showScreen('screen-dashboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to Dashboard
                </button>
            </div>

            <!-- Screen 3: Input Form -->
            <div id="screen-input" class="screen">
                <h2 id="input-title" class="screen-title">Setup Quantification</h2>
                
                <div class="form-container">
                    <div class="input-group">
                        <label>Root Folder Path</label>
                        <input type="text" id="root-folder" placeholder="e.g. C:\Projects\Model Files">
                    </div>
                    
                    <div class="input-group">
                        <label>MHC Filename</label>
                        <input type="text" id="mhc-filename" placeholder="e.g. Asbuilt - Sewer">
                    </div>

                    <div class="input-group" id="custom-branch-group" style="display: none;">
                        <label>Branch Number</label>
                        <input type="text" id="custom-branch" placeholder="e.g. 001">
                    </div>

                    <div id="status-message" class="status-msg"></div>

                    <div class="form-actions">
                        <button class="back-btn" onclick="showScreen('screen-options')">Back</button>
                        <button class="primary-btn" id="run-btn" onclick="runQuantify()">Run Quantification</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Quantify Systems.</p>
        </footer>
    </div>

    <script>
        let currentNetwork = 'Sewer';
        let currentMode = 'modelled';

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('status-message').textContent = '';
            document.getElementById('status-message').className = 'status-msg';
        }

        function selectNetwork(networkType) {
            currentNetwork = networkType;
            const title = document.getElementById('options-title');
            title.textContent = networkType + " Options";
            
            // Apply color coding based on network
            if (networkType === 'Sewer') {
                title.style.color = '#FFA726'; // Orange
            } else {
                title.style.color = '#26C6DA'; // Cyan
            }
            
            showScreen('screen-options');
        }

        function openInputForm(mode) {
            currentMode = mode;
            if (mode === 'customize') {
                document.getElementById('custom-branch-group').style.display = 'block';
            } else {
                document.getElementById('custom-branch-group').style.display = 'none';
            }
            showScreen('screen-input');
        }

        async function runQuantify() {
            const rootFolder = document.getElementById('root-folder').value;
            const mhcFilename = document.getElementById('mhc-filename').value;
            const customBranch = document.getElementById('custom-branch').value;
            const statusDiv = document.getElementById('status-message');
            const runBtn = document.getElementById('run-btn');

            if (!rootFolder || !mhcFilename) {
                statusDiv.textContent = "Please fill in all required fields.";
                statusDiv.className = 'status-msg error';
                return;
            }

            // UI Loading state
            runBtn.disabled = true;
            runBtn.innerHTML = `<span class="spinner"></span> Processing...`;
            statusDiv.textContent = "Analyzing network files and generating spreadsheet...";
            statusDiv.className = 'status-msg info';

            try {
                const response = await fetch('/api/quantify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        network_type: currentNetwork,
                        mode: currentMode,
                        mhc_filename: mhcFilename,
                        root_folder: rootFolder,
                        custom_branch: currentMode === 'customize' ? customBranch : null
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.textContent = `Success! ${data.message}`;
                    statusDiv.className = 'status-msg success';
                } else {
                    statusDiv.textContent = `Error: ${data.detail}`;
                    statusDiv.className = 'status-msg error';
                }
            } catch (err) {
                statusDiv.textContent = "Failed to connect to the server.";
                statusDiv.className = 'status-msg error';
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = "Run Quantification";
            }
        }
    </script>
</body>
</html>
