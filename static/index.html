<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantify</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <h1 class="logo">Quantify</h1>
        </header>

        <main id="main-content">
            
            <div id="screen-dashboard" class="screen active">
                <div class="card sewer-card" onclick="selectNetwork('Sewer')">
                    <div class="card-icon sewer-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="9" x2="22" y2="9"></line>
                            <line x1="2" y1="15" x2="22" y2="15"></line>
                            <line x1="9" y1="2" x2="9" y2="22"></line>
                            <line x1="15" y1="2" x2="15" y2="22"></line>
                        </svg>
                    </div>
                    <div class="card-content">
                        <h2>Sewer</h2>

                    </div>
                </div>
                
                <div class="card storm-card" onclick="selectNetwork('Stormwater')">
                    <div class="card-icon storm-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.5 18H6.5c-2.5 0-4.5-2-4.5-4.5 0-2.4 1.9-4.4 4.3-4.5C6.8 5.5 9.9 3 13.5 3c3.3 0 6 2.4 6.5 5.6 1.7.7 3 2.4 3 4.4 0 2.5-2 4.5-4.5 4.5z"></path>
                            <line x1="10" y1="21" x2="8.6" y2="23"></line>
                            <line x1="14" y1="21" x2="12.6" y2="23"></line>
                            <line x1="18" y1="21" x2="16.6" y2="23"></line>
                        </svg>
                    </div>
                    <div class="card-content">
                        <h2>Stormwater</h2>

                    </div>
                </div>
            </div>

            <div id="screen-options" class="screen">
                <h2 id="options-title" class="screen-title">Sewer Options</h2>
                <div class="options-container">
                    <div class="card option-card" onclick="openInputForm('modelled')">
                        <div class="card-icon option-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="3" width="4" height="4"></rect><rect x="3" y="17" width="4" height="4"></rect><rect x="17" y="17" width="4" height="4"></rect><line x1="12" y1="7" x2="12" y2="12"></line><line x1="5" y1="12" x2="19" y2="12"></line><line x1="5" y1="12" x2="5" y2="17"></line><line x1="19" y1="12" x2="19" y2="17"></line></svg>
                        </div>
                        <h3>Modelled Network</h3>

                    </div>
                    <div class="card option-card" onclick="openInputForm('customize')">
                        <div class="card-icon option-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="8" cy="9" r="2"></circle>
                                <path d="M10 9h8"></path>
                                <circle cx="16" cy="15" r="2"></circle>
                                <path d="M6 15h8"></path>
                            </svg>
                        </div>
                        <h3>Customize Network</h3>
                    </div>
                </div>
                <button class="back-btn" onclick="showScreen('screen-dashboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to Dashboard
                </button>
            </div>

            <div id="screen-input" class="screen">
                <h2 id="input-title" class="screen-title">Attach Model Files</h2>
                <div class="form-container">
                    
                    <div class="input-group">
                        <label>Attach Model Files (.inv, .ngl, .mhc, .brn or .zip)</label>
                        <div class="drop-zone" id="drop-zone">
                            <span class="drop-zone-prompt">Drop files here or click to upload</span>
                            <input type="file" name="files" id="file-input" class="drop-zone-input" multiple>
                        </div>
                        <div id="file-list" class="file-list"></div>
                    </div>
                    
                    <div class="input-group">
                        <label>MHC Filename</label>
                        <input type="text" id="mhc-filename" placeholder="e.g. Asbuilt - Sewer">
                    </div>

                    <div id="custom-branch-group" class="input-group" style="display: none;">
                        <label>Add Branches</label>
                        <div class="custom-branch-inputs">
                            <input type="text" id="upstream-node" placeholder="Upstream node">
                            <input type="text" id="downstream-node" placeholder="Downstream node">
                            <button type="button" class="add-branch-btn" onclick="addCustomBranch()">Add Branch</button>
                        </div>
                        <div class="branches-added-container">
                            <h4>Branches Added</h4>
                            <div id="added-branches-list" class="added-branches-list">
                                <!-- Dynamic items here -->
                            </div>
                        </div>
                    </div>

                    <div id="status-message" class="status-msg"></div>

                    <div id="progress-container" class="progress-container">
                        <div class="progress-header">
                            <span>Progress</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="progress-bar" class="progress-bar"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="back-btn" onclick="showScreen('screen-options')">Back</button>
                        <button class="primary-btn" id="run-btn" onclick="runQuantify()">Quantify</button>
                    </div>
                </div>
            </div>

        </main>

        <footer>
            <p>&copy; 2026 Quantify Systems.</p>
        </footer>
    </div>

    <script>
        let currentNetwork = 'Sewer';
        let currentMode = 'modelled';
        let selectedFiles = [];
        let customBranches = [];

        // File Drop Zone Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');

        dropZone.addEventListener('click', (e) => {
            if (e.target !== fileInput) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => {
                dropZone.classList.remove('drop-zone--over');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            fileList.innerHTML = '';
            selectedFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.textContent = file.name;
                fileList.appendChild(item);
            });
            
            if (selectedFiles.length > 0) {
                document.querySelector('.drop-zone-prompt').textContent = `${selectedFiles.length} files selected`;
            }
            validateForm();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('status-message').textContent = '';
            document.getElementById('status-message').className = 'status-msg';
        }

        function selectNetwork(networkType) {
            currentNetwork = networkType;
            const title = document.getElementById('options-title');
            const screenOptions = document.getElementById('screen-options');
            
            title.textContent = networkType + " Options";
            screenOptions.classList.remove('theme-sewer', 'theme-stormwater');
            
            if (networkType === 'Sewer') {
                title.style.color = '#FFA726';
                screenOptions.classList.add('theme-sewer');
            } else {
                title.style.color = '#26C6DA';
                screenOptions.classList.add('theme-stormwater');
            }
            showScreen('screen-options');
        }

        function openInputForm(mode) {
            currentMode = mode;
            document.getElementById('custom-branch-group').style.display = mode === 'customize' ? 'block' : 'none';
            
            const screenInput = document.getElementById('screen-input');
            const inputTitle = document.getElementById('input-title');
            const mhcInput = document.getElementById('mhc-filename');
            screenInput.classList.remove('theme-sewer', 'theme-stormwater');
            
            if (currentNetwork === 'Sewer') {
                screenInput.classList.add('theme-sewer');
                inputTitle.style.color = '#FFA726';
                mhcInput.placeholder = "e.g. Moonlight City - Sewer";
            } else {
                screenInput.classList.add('theme-stormwater');
                inputTitle.style.color = '#26C6DA';
                mhcInput.placeholder = "e.g. Moonlight City - Stormwater";
            }
            
            // Clear previous custom branches if switching modes
            if (mode === 'modelled') customBranches = [];
            renderCustomBranches();
            
            showScreen('screen-input');
            validateForm();
        }

        function addCustomBranch() {
            const up = document.getElementById('upstream-node').value.trim();
            const down = document.getElementById('downstream-node').value.trim();
            
            if (up && down) {
                customBranches.push(`${up} - ${down}`);
                document.getElementById('upstream-node').value = '';
                document.getElementById('downstream-node').value = '';
                renderCustomBranches();
            }
        }

        function removeBranch(index) {
            customBranches.splice(index, 1);
            renderCustomBranches();
        }

        function renderCustomBranches() {
            const list = document.getElementById('added-branches-list');
            list.innerHTML = '';
            customBranches.forEach((branch, idx) => {
                const item = document.createElement('div');
                item.className = 'branch-item';
                item.innerHTML = `
                    <span>${idx + 1}. ${branch}</span>
                    <span class="remove-btn" onclick="removeBranch(${idx})">REMOVE</span>
                `;
                list.appendChild(item);
            });
            validateForm();
        }

        function validateForm() {
            const mhcFilename = document.getElementById('mhc-filename').value.trim();
            const runBtn = document.getElementById('run-btn');
            
            let isValid = selectedFiles.length > 0 && mhcFilename !== "";
            
            if (currentMode === 'customize' && customBranches.length === 0) {
                isValid = false;
            }
            
            runBtn.disabled = !isValid;
        }

        // Add event listeners for validation
        document.getElementById('mhc-filename').addEventListener('input', validateForm);

        async function runQuantify() {
            const mhcFilename = document.getElementById('mhc-filename').value;
            const statusDiv = document.getElementById('status-message');
            const runBtn = document.getElementById('run-btn');

            if (selectedFiles.length === 0 || !mhcFilename) {
                statusDiv.textContent = "Please attach files and enter the MHC filename.";
                statusDiv.className = 'status-msg error';
                return;
            }

            if (currentMode === 'customize' && customBranches.length === 0) {
                statusDiv.textContent = "Please add at least one branch for customized quantification.";
                statusDiv.className = 'status-msg error';
                return;
            }

            runBtn.disabled = true;
            runBtn.innerHTML = `<span class="spinner"></span> Processing...`;
            statusDiv.textContent = "Uploading files and processing network...";
            statusDiv.className = 'status-msg info';

            // Show and reset progress bar
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            progressContainer.classList.add('active');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            
            // Simulated progress while waiting for API
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += (90 - width) * 0.1;
                    progressBar.style.width = width + '%';
                    progressPercent.textContent = Math.round(width) + '%';
                }
            }, 300);

            const formData = new FormData();
            formData.append('network_type', currentNetwork);
            formData.append('mode', currentMode);
            formData.append('mhc_filename', mhcFilename);
            
            if (currentMode === 'customize') {
                // Join branches with comma for the backend to parse
                formData.append('custom_branch', customBranches.join(','));
            }
            
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                const response = await fetch('/api/quantify', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    clearInterval(interval);
                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    setTimeout(() => {
                        progressContainer.classList.remove('active');
                    }, 500);
                    statusDiv.innerHTML = `Success! <a href="${data.file_url}" class="download-link" download>Download ${currentNetwork} Spreadsheet</a>`;
                    statusDiv.className = 'status-msg success';
                } else {
                    clearInterval(interval);
                    progressContainer.classList.remove('active');
                    statusDiv.textContent = `Error: ${data.detail}`;
                    statusDiv.className = 'status-msg error';
                }
            } catch (err) {
                clearInterval(interval);
                progressContainer.classList.remove('active');
                statusDiv.textContent = "Failed to connect to the server.";
                statusDiv.className = 'status-msg error';
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = "Quantify";
            }
        }
    </script>
</body>
</html>
